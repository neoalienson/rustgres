server:
  host: "0.0.0.0"
  port: 5432
  max_connections: 200

storage:
  data_dir: "/var/lib/vaultgres/data"
  wal_dir: "/var/lib/vaultgres/wal"
  buffer_pool_size: 1000
  page_size: 8192

logging:
  level: "info"
  scope: "*"

transaction:
  timeout: 300
  mvcc_enabled: true

wal:
  segment_size: 16
  compression: false
  sync_on_commit: true

performance:
  worker_threads: 2
  query_cache: false
  max_parallel_workers: 4
